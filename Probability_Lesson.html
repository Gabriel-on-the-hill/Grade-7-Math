<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probability — Grade 7 Math</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap"
    rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg1: #1a0533;
      --bg2: #0d1b3e;
      --card: #ffffff12;
      --card-solid: #1e1245;
      --accent1: #ff6b6b;
      --accent2: #ffd93d;
      --accent3: #6bcb77;
      --accent4: #4d96ff;
      --accent5: #a855f7;
      --accent6: #f472b6;
      --text: #f0f0ff;
      --text-dim: #a0a0c0;
      --text-dark: #1a1a2e;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0, 0, 0, .35);
      --transition: all .4s cubic-bezier(.4, 0, .2, 1);
      --font: 'Nunito', sans-serif;
      --font-title: 'Fredoka One', cursive;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      overflow: hidden
    }

    /* ===== PROGRESS BAR ===== */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3), var(--accent4), var(--accent5));
      z-index: 1000;
      transition: width .5s ease;
      border-radius: 0 3px 3px 0
    }

    /* ===== TOP NAV ===== */
    .top-nav {
      position: fixed;
      top: 5px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem 1.5rem;
      z-index: 999;
      background: rgba(10, 5, 30, .7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, .06)
    }

    .top-nav .logo {
      font-family: var(--font-title);
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: .5rem
    }

    .lesson-tabs {
      display: flex;
      gap: .3rem;
      background: rgba(255, 255, 255, .08);
      padding: 4px;
      border-radius: 24px
    }

    .lesson-tabs button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: .75rem;
      font-weight: 700;
      padding: .4rem .9rem;
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap
    }

    .lesson-tabs button.active {
      background: var(--accent5);
      color: #fff;
      box-shadow: 0 2px 10px rgba(168, 85, 247, .4)
    }

    .lesson-tabs button:hover:not(.active) {
      color: #fff
    }

    .slide-counter {
      font-size: .8rem;
      color: var(--text-dim);
      font-weight: 700
    }

    /* ===== SLIDE CONTAINER ===== */
    .slides-viewport {
      position: fixed;
      top: 60px;
      bottom: 70px;
      left: 0;
      right: 0;
      overflow: hidden
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      transform: translateX(60px);
      transition: opacity .5s ease, transform .5s ease;
      pointer-events: none
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all
    }

    .slide.exit-left {
      opacity: 0;
      transform: translateX(-60px)
    }

    .slide-inner {
      max-width: 900px;
      width: 100%;
      max-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--accent5) transparent;
      padding: 1rem
    }

    .slide-inner::-webkit-scrollbar {
      width: 5px
    }

    .slide-inner::-webkit-scrollbar-thumb {
      background: var(--accent5);
      border-radius: 10px
    }

    /* ===== CARD STYLES ===== */
    .glass-card {
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow)
    }

    .concept-card {
      background: linear-gradient(145deg, rgba(168, 85, 247, .12), rgba(77, 150, 255, .08));
      border: 1px solid rgba(168, 85, 247, .2);
      border-radius: var(--radius);
      padding: 1.5rem
    }

    /* ===== PHASE INDICATOR ===== */
    .phase-indicator {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      position: relative
    }

    .phase-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      font-size: .7rem;
      color: var(--text-dim);
      opacity: .5;
      transition: var(--transition)
    }

    .phase-step.active {
      opacity: 1;
      color: var(--accent2);
      transform: scale(1.1)
    }

    .phase-step .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 10px currentColor
    }

    /* ===== TYPOGRAPHY ===== */
    .slide-title {
      font-family: var(--font-title);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      margin-bottom: .8rem;
      line-height: 1.2
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .text-dim {
      color: var(--text-dim)
    }

    .key-word {
      color: var(--accent2);
      font-weight: 800
    }

    .vocab-tag {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent5), var(--accent4));
      color: #fff;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
      margin: 0 3px
    }

    /* ===== COMPONENTS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.4rem;
      border: none;
      border-radius: 25px;
      font-family: var(--font);
      font-weight: 700;
      font-size: .9rem;
      cursor: pointer;
      transition: var(--transition);
      color: #fff
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, .3)
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent4), var(--accent5))
    }

    .btn-success {
      background: linear-gradient(135deg, var(--accent3), #2ea043)
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      color: #1a0533
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start
    }

    @media(max-width:768px) {
      .two-col {
        grid-template-columns: 1fr
      }
    }

    /* ===== INTERACTIVE ELEMENTS ===== */
    .answer-input {
      background: rgba(255, 255, 255, .1);
      border: 2px solid rgba(255, 255, 255, .15);
      border-radius: var(--radius-sm);
      padding: .8rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 1.1rem;
      width: 100%;
      transition: var(--transition)
    }

    .answer-input:focus {
      outline: none;
      border-color: var(--accent4);
      background: rgba(255, 255, 255, .15)
    }

    .mcq-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
      margin-top: 1rem
    }

    .mcq-btn {
      background: rgba(255, 255, 255, .06);
      border: 2px solid rgba(255, 255, 255, .12);
      border-radius: var(--radius-sm);
      padding: 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
      font-weight: 600
    }

    .mcq-btn:hover {
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .3)
    }

    .mcq-btn.selected {
      border-color: var(--accent4);
      background: rgba(77, 150, 255, .15)
    }

    .mcq-btn.correct {
      border-color: var(--accent3) !important;
      background: rgba(107, 203, 119, .15) !important
    }

    .mcq-btn.wrong {
      border-color: var(--accent1) !important;
      background: rgba(255, 107, 107, .1) !important
    }

    .feedback-box {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      display: none;
      animation: fadeIn .4s ease
    }

    .feedback-box.correct {
      background: rgba(107, 203, 119, .15);
      border: 1px solid var(--accent3);
      color: var(--accent3)
    }

    .feedback-box.wrong {
      background: rgba(255, 107, 107, .15);
      border: 1px solid var(--accent1);
      color: var(--accent1)
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1.5rem;
      background: rgba(10, 5, 30, .85);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, .06);
      z-index: 999
    }

    .nav-btn {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .1);
      padding: .6rem 1.2rem;
      border-radius: 20px;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      transition: var(--transition)
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, .2)
    }

    .nav-btn:disabled {
      opacity: .3;
      cursor: not-allowed
    }

    .nav-btn.next {
      background: var(--accent4);
      border-color: var(--accent4);
      color: #fff
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fade-in {
      animation: fadeIn .6s ease forwards
    }

    .delay-1 {
      animation-delay: .1s
    }

    .delay-2 {
      animation-delay: .2s
    }

    .delay-3 {
      animation-delay: .3s
    }

    /* ===== CONFETTI ===== */
    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      z-index: 2000;
      pointer-events: none;
      animation: fall 3s linear forwards
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0
      }
    }
  </style>
</head>

<body>

  <div class="progress-bar" id="progressBar"></div>

  <nav class="top-nav">
    <div class="logo">🎲 Grade 7 Probability</div>
    <div class="lesson-tabs" id="lessonTabs">
      <button class="active" onclick="switchLesson(1)">Lesson 1</button>
      <button onclick="switchLesson(2)">Lesson 2</button>
      <button onclick="switchLesson(3)">Lesson 3</button>
    </div>
    <div class="slide-counter" id="slideCounter">1 / 15</div>
  </nav>

  <div class="slides-viewport" id="viewport">
    <!-- Slides injected by JS -->
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn" id="prevBtn" onclick="move(-1)">← Back</button>
    <div class="phase-indicator" id="phaseIndicator">
      <!-- Phases injected by JS -->
    </div>
    <button class="nav-btn next" id="nextBtn" onclick="move(1)">Next →</button>
  </nav>

  <script>
    // ===== APP DATA =====
    const lessons = [
      {
        id: 1, title: 'Simple Events', content: [
          // --- CONCEPTS ---
          { phase: 'Concept', layout: 'title', title: 'Probability', subtitle: 'What are the chances?', goals: ['Find probability of simple events', 'Express as fractions, decimals, percents', 'Understand complementary events'] },
          { phase: 'Concept', layout: 'split', title: 'What is Probability?', left: '<p style="font-size:1.1rem;line-height:1.6">The <strong>probability</strong> of an event is a ratio that compares the number of <em>favourable outcomes</em> to the number of <em>possible outcomes</em>.</p><div class="concept-card" style="margin-top:1rem;text-align:center">P(event) = <span style="border-bottom:2px solid;display:inline-block;line-height:1.2">Favourable</span><br>Possible</div>', right: '<div class="glass-card"><strong>Quick Examples:</strong><br>🪙 Coin flip: P(Heads) = 1/2<br>🎲 Die roll: P(3) = 1/6<br>🃏 Ace draw: P(Ace) = 4/52</div>' },
          { phase: 'Concept', layout: 'center', title: 'The Probability Scale', content: '<div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-weight:700;font-size:.9rem"><span style="color:#ef4444">Impossible (0)</span><span style="color:#eab308">50-50 (0.5)</span><span style="color:#22c55e">Certain (1)</span></div><div style="height:20px;background:linear-gradient(90deg,#ef4444,#eab308,#22c55e);border-radius:10px;margin-bottom:1rem"></div><p>Probability is always between <strong>0 and 1</strong>.</p>' },
          { phase: 'Concept', layout: 'split', title: 'Example: Rolling a Die', left: '<p>Find <strong>P(6)</strong> on a standard die.</p><ol style="margin-top:1rem;padding-left:1.5rem;line-height:1.8"><li>Favourable outcomes (getting a 6) = <strong>1</strong></li><li>Possible outcomes (1,2,3,4,5,6) = <strong>6</strong></li></ol>', right: '<div style="font-size:4rem;text-align:center">🎲</div><p style="text-align:center;font-size:1.5rem;margin-top:1rem">P(6) = <strong>1/6</strong></p>' },
          { phase: 'Concept', layout: 'split', title: 'Complementary Events', left: '<p>Two events are <strong>complementary</strong> if they cannot happen at the same time and their probabilities add up to <strong>1</strong>.</p><p style="margin-top:1rem"><strong>P(event) + P(not event) = 1</strong></p>', right: '<div class="glass-card"><strong>Example:</strong><br>P(Rain) = 30%<br>P(No Rain) = 100% - 30% = <strong>70%</strong></div>' },

          // --- GUIDED PRACTICE ---
          { phase: 'Guided', layout: 'question', badge: '🟢 Guided Practice', title: 'Letter Tiles', question: 'A bag contains tiles: <strong>A, B, A, C, A, B</strong>. Find <strong>P(B)</strong>.', hint: 'Count total tiles (possible) and number of B\'s (favourable).', type: 'multi', answers: ['2/6', '1/3', '0.33', '33%'], correct: 0, explanation: 'There are 2 B\'s and 6 total tiles. P(B) = 2/6 = 1/3.' },
          { phase: 'Guided', layout: 'question', badge: '🟢 Guided Practice', title: 'Complement', question: 'If P(Win) = 0.45, what is <strong>P(Not Win)</strong>?', hint: 'Subtract P(Win) from 1.', type: 'multi', answers: ['0.55', '55%'], correction: 0, explanation: '1.00 - 0.45 = 0.55.' },

          // --- INDEPENDENT PRACTICE ---
          { phase: 'Independent', layout: 'question', badge: '🟠 Independent Practice', title: 'Spinner', question: 'A spinner has 8 equal sections numbered 1-8. What is P(number > 5)?', visual: '<div style="text-align:center;font-size:3rem">🎡</div>', hint: 'Numbers > 5 are 6, 7, 8.', type: 'multi', answers: ['3/8', '0.375', '37.5%'], explanation: 'Favourable numbers are 6, 7, 8 (3 numbers). Total is 8. P(>5) = 3/8.' },
          { phase: 'Independent', layout: 'question', badge: '🟠 Independent Practice', title: 'Marbles', question: 'Bag has 3 Red, 4 Blue, 5 Green. Find P(Blue or Green).', hint: 'Add Blue + Green for favourable.', type: 'multi', answers: ['9/12', '3/4', '0.75', '75%'], explanation: 'Blue(4) + Green(5) = 9. Total = 12. P = 9/12 = 3/4.' },

          // --- HOMEWORK ---
          { phase: 'Homework', layout: 'question', badge: '📝 Homework', title: 'Word Problem', question: 'A deck has 52 cards. P(Ace) is 4/52. What is P(Not Ace)?', hint: 'Use the complement rule.', type: 'multi', answers: ['48/52', '12/13'], explanation: 'Total - Aces = 52 - 4 = 48. P(Not Ace) = 48/52 = 12/13.' },
          { phase: 'Homework', layout: 'question', badge: '📝 Homework', title: 'H.O.T. Challenge', question: 'If you add 2 red marbles to a bag of 8 red and 2 blue, how does P(Blue) change? (Increase/Decrease/Same)', type: 'mcq', options: ['Increase', 'Decrease', 'Stay Same'], correct: 1, explanation: 'Total Increases, so the denominator gets bigger while the numerator (Blue) stays the same. The fraction gets smaller.' }
        ]
      },
      {
        id: 2, title: 'Theoretical vs. Experimental', content: [
          // --- CONCEPTS ---
          { phase: 'Concept', layout: 'split', title: 'Theoretical vs. Experimental', left: '<p><strong>Theoretical Probability:</strong> What <em>should</em> happen based on math.<br>P(Head) = 1/2</p><p style="margin-top:1rem"><strong>Experimental Probability:</strong> What <em>actually</em> happens in an experiment.<br>P(Head) = (Number of Heads) / (Total Flips)</p>', right: '<div class="glass-card"><strong>Key Insight:</strong><br>The more trials you do, the closer the experimental probability gets to the theoretical probability.<br><br>This is the <span class="key-word">Law of Large Numbers</span>.</div>' },
          { phase: 'Concept', layout: 'center', title: 'Uniform Probability Models', content: '<p style="text-align:left">A <strong>uniform probability model</strong> is when all outcomes are equally likely.</p><ul style="text-align:left;margin-top:1rem;line-height:2"><li>✅ Fair Coin (Heads/Tails equal)</li><li>✅ Fair Die (1-6 equal)</li><li>❌ Weighted Die (6 comes up more often)</li></ul>' },

          // --- GUIDED PRACTICE ---
          { phase: 'Guided', layout: 'question', badge: '🟢 Guided Practice', title: 'Coin Toss Experiment', question: 'You flip a coin 50 times. It lands on Heads 30 times. What is the <strong>experimental probability</strong> of Heads?', hint: 'Experimental P = (Successful Trials) / (Total Trials).', type: 'multi', answers: ['30/50', '3/5', '0.6', '60%'], explanation: 'Heads appeared 30 times out of 50. P(Heads) = 30/50 = 3/5 = 60%.' },
          { phase: 'Guided', layout: 'question', badge: '🟢 Guided Practice', title: 'Comparing Probabilities', question: 'The Theoretical P(Heads) is 50%. Your Experimental P(Heads) was 60%. Are they exactly the same?', type: 'mcq', options: ['Yes', 'No'], correct: 1, explanation: 'They are rarely exactly the same in small experiments, but they should be close.' },

          // --- INDEPENDENT PRACTICE ---
          { phase: 'Independent', layout: 'question', badge: '🟠 Independent Practice', title: 'Dice Data', question: 'A die is rolled 60 times. It lands on "1" ten times. Is this close to the theoretical probability?', type: 'mcq', options: ['Yes', 'No'], correct: 0, explanation: 'Theoretical P(1) = 1/6. 1/6 of 60 is 10. So getting "1" ten times is exactly what we expect!' },
          { phase: 'Independent', layout: 'question', badge: '🟠 Independent Practice', title: 'Spinner Prediction', question: 'A spinner has 4 equal colors. If you spin it 100 times, about how many times do you expect it to land on Red?', hint: 'Theoretical P(Red) = 1/4.', type: 'multi', answers: ['25'], explanation: 'P(Red) = 1/4. 1/4 of 100 spins = 25.' },

          // --- HOMEWORK ---
          { phase: 'Homework', layout: 'question', badge: '📝 Homework', title: 'Quality Control', question: 'A factory tests 500 bulbs. 5 are broken. What is the experimental probability of a broken bulb?', hint: 'Broken / Total.', type: 'multi', answers: ['5/500', '1/100', '0.01', '1%'], explanation: '5 broken out of 500 total = 5/500 = 1/100 = 1%.' },
          { phase: 'Homework', layout: 'question', badge: '📝 Homework', title: 'Prediction', question: 'If 1% of bulbs are broken (from previous Q), how many broken bulbs would you expect in a shipment of 2,000?', hint: '1% of 2,000.', type: 'multi', answers: ['20'], explanation: '0.01 x 2000 = 20 broken bulbs.' }
        ]
      },
      {
        id: 3, title: 'Compound Events', content: [
          // --- CONCEPTS ---
          { phase: 'Concept', layout: 'split', title: 'Compound Events', left: '<p>A <strong>compound event</strong> is an event that consists of two or more simple events.</p><p style="margin-top:1rem"><strong>Sample Space:</strong> The set of <em>all possible outcomes</em>.</p>', right: '<div class="glass-card"><strong>Example:</strong><br>Rolling a die AND flipping a coin.<br><br>Outcomes: 1H, 1T, 2H, 2T...</div>' },
          { phase: 'Concept', layout: 'center', title: 'Tree Diagrams', content: '<p style="text-align:center">A <strong>tree diagram</strong> helps list all outcomes.</p><div style="font-family:monospace;margin-top:1rem;font-size:1.2rem;line-height:1.5">Start<br>├── Heads<br>│   ├── Heads (HH)<br>│   └── Tails (HT)<br>└── Tails<br>    ├── Heads (TH)<br>    └── Tails (TT)</div><p style="margin-top:1rem">Sample Space = {HH, HT, TH, TT}</p>' },

          // --- GUIDED PRACTICE ---
          { phase: 'Guided', layout: 'question', badge: '🟢 Guided Practice', title: 'Coin Flip Twice', question: 'You flip a coin twice. What is P(Two Tails)?', hint: 'Look at the tree diagram: HH, HT, TH, TT.', type: 'multi', answers: ['1/4', '0.25', '25%'], explanation: 'Only TT is two tails. 1 outcome out of 4 total. P(TT) = 1/4.' },
          { phase: 'Guided', layout: 'question', badge: '🟢 Guided Practice', title: 'Sandwich Combo', question: '3 Breads (White, Wheat, Rye) and 2 Meats (Turkey, Ham). How many total sandwich combinations?', hint: 'Multiply outcomes: 3 x 2.', type: 'multi', answers: ['6'], explanation: '3 breads x 2 meats = 6 outcomes (Fundamental Counting Principle).' },

          // --- INDEPENDENT PRACTICE ---
          { phase: 'Independent', layout: 'question', badge: '🟠 Independent Practice', title: 'Spinner + Coin', question: 'Spinner (Red, Blue) and Coin (Heads, Tails). What is P(Red AND Heads)?', hint: 'Sample space: RH, RT, BH, BT.', type: 'multi', answers: ['1/4', '0.25', '25%'], explanation: 'RH is 1 outcome. Total outcomes = 2 x 2 = 4. P(RH) = 1/4.' },
          { phase: 'Independent', layout: 'question', badge: '🟠 Independent Practice', title: 'Clothes', question: '4 Shirts and 3 Pants. P(Red Shirt and Blue Pants) if chosen randomly?', hint: 'Total outfits = 4 x 3 = 12.', type: 'multi', answers: ['1/12'], explanation: '1 specific outfit out of 12 total. P = 1/12.' },

          // --- HOMEWORK ---
          { phase: 'Homework', layout: 'question', badge: '📝 Homework', title: 'Dinner Time', question: 'Menu: 3 Appetizers, 4 Entrees, 2 Desserts. How many total meal combinations?', hint: 'Multiply them all.', type: 'multi', answers: ['24'], explanation: '3 x 4 x 2 = 24 combinations.' },
          { phase: 'Homework', layout: 'question', badge: '📝 Homework', title: 'Triplets', question: 'A family has 3 children (Boy/Girl). P(All 3 are Girls)?', hint: '2 x 2 x 2 = 8 outcomes. GGG is one.', type: 'multi', answers: ['1/8', '0.125', '12.5%'], explanation: 'Outcomes: BBB, BBG, BGB, BGG, GBB, GBG, GGB, GGG. Only GGG matches. P = 1/8.' }
        ]
      }
    ];

    let currentLessonId = 1;
    let currentSlideIndex = 0;

    // ===== CORE ENGINE =====
    function initApp() {
      renderSlide();
      updateUI();
    }

    function switchLesson(id) {
      currentLessonId = id;
      currentSlideIndex = 0;
      document.querySelectorAll('.lesson-tabs button').forEach((b, i) => {
        b.classList.toggle('active', i + 1 === id);
      });
      renderSlide();
      updateUI();
    }

    function move(dir) {
      const lesson = lessons.find(l => l.id === currentLessonId);
      const next = currentSlideIndex + dir;
      if (next >= 0 && next < lesson.content.length) {
        currentSlideIndex = next;
        renderSlide();
        updateUI();
      }
    }

    function renderSlide() {
      const lesson = lessons.find(l => l.id === currentLessonId);
      const slideData = lesson.content[currentSlideIndex];
      const viewport = document.getElementById('viewport');

      if (!slideData) {
        viewport.innerHTML = `<div class="slide active"><div class="slide-inner" style="text-align:center"><h2>🚧 Lesson Content Coming Soon</h2></div></div>`;
        return;
      }

      // Phase Indicator Update
      const phases = ['Concept', 'Guided', 'Independent', 'Homework'];
      const phaseIndex = phases.findIndex(p => slideData.phase.includes(p));
      const indicators = phases.map((p, i) => `
    <div class="phase-step ${i === phaseIndex ? 'active' : ''}">
      <div class="dot"></div><span>${p}</span>
    </div>
  `).join('');
      document.getElementById('phaseIndicator').innerHTML = indicators;

      // Slide Content Generation
      let contentHTML = '';

      // Standard Layouts
      if (slideData.layout === 'title') {
        contentHTML = `
      <div style="text-align:center;margin-top:2rem">
        <div style="font-size:3rem;margin-bottom:1rem">🎲 🎯 🃏</div>
        <h1 class="slide-title" style="font-size:3rem">${slideData.title}</h1>
        <p style="font-size:1.2rem;color:var(--text-dim)">${slideData.subtitle}</p>
        <div class="glass-card fade-in delay-1" style="margin-top:2rem;display:inline-block;text-align:left">
          <ul style="padding-left:1.5rem;line-height:2">
            ${slideData.goals.map(g => `<li>${g}</li>`).join('')}
          </ul>
        </div>
      </div>`;
      } else if (slideData.layout === 'split') {
        contentHTML = `
      <h2 class="slide-title gradient-text">${slideData.title}</h2>
      <div class="two-col">
        <div class="fade-in">${slideData.left}</div>
        <div class="fade-in delay-1">${slideData.right}</div>
      </div>`;
      } else if (slideData.layout === 'center') {
        contentHTML = `
      <div style="text-align:center;max-width:800px;margin:0 auto">
        <h2 class="slide-title gradient-text">${slideData.title}</h2>
        <div class="glass-card fade-in">${slideData.content}</div>
      </div>`;
      } else if (slideData.layout === 'question') {
        contentHTML = `
      <span class="vocab-tag mb-2">${slideData.badge || 'Practice'}</span>
      <h2 class="slide-title">${slideData.title}</h2>
      <div class="two-col">
        <div class="concept-card fade-in">
          <p style="font-size:1.1rem;line-height:1.6">${slideData.question}</p>
          ${slideData.visual || ''}
        </div>
        <div>
          ${renderInput(slideData)}
          <div class="feedback-box" id="fb-${currentSlideIndex}"></div>
          <div style="margin-top:1rem;display:flex;gap:.5rem">
            <button class="btn btn-success" onclick="checkAnswer()">Check Answer</button>
            <button class="btn btn-warning" onclick="toggleHint()">💡 Hint</button>
          </div>
          <div id="hint-box" style="display:none;margin-top:1rem;padding:1rem;background:rgba(255,217,61,.1);border-radius:10px;font-size:.9rem">
            <strong>Hint:</strong> ${slideData.hint}
          </div>
        </div>
      </div>`;
      }

      viewport.innerHTML = `<div class="slide active"><div class="slide-inner">${contentHTML}</div></div>`;
    }

    function renderInput(data) {
      if (data.type === 'mcq') {
        return `<div class="mcq-grid">
      ${data.options.map((opt, i) =>
          `<button class="mcq-btn" onclick="selectMcq(this, ${i})">${String.fromCharCode(65 + i)}. ${opt}</button>`
        ).join('')}
    </div>`;
      } else {
        return `<input type="text" class="answer-input" placeholder="Type your answer..." id="textArgs">`;
      }
    }

    // Interactive Logic handles selection and checking
    let selectedMcqIndex = -1;

    window.selectMcq = function (btn, index) {
      document.querySelectorAll('.mcq-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMcqIndex = index;
    }

    window.toggleHint = function () {
      const box = document.getElementById('hint-box');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    window.checkAnswer = function () {
      const lesson = lessons.find(l => l.id === currentLessonId);
      const data = lesson.content[currentSlideIndex];
      const fb = document.getElementById(`fb-${currentSlideIndex}`);
      let isCorrect = false;

      if (data.type === 'mcq') {
        if (selectedMcqIndex === -1) return;
        isCorrect = selectedMcqIndex === data.correct;
        document.querySelectorAll('.mcq-btn')[data.correct].classList.add('correct');
        if (!isCorrect) document.querySelectorAll('.mcq-btn')[selectedMcqIndex].classList.add('wrong');
      } else {
        const input = document.getElementById('textArgs');
        const val = input.value.trim().toLowerCase();
        isCorrect = data.answers.some(a => val.includes(a.toLowerCase()));
      }

      fb.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
      fb.innerHTML = isCorrect ? `<strong>🎉 Correct!</strong> ${data.explanation || 'Great job!'}` : `<strong>❌ Not quite.</strong> Try again!`;
      fb.style.display = 'block';

      if (isCorrect) fireConfetti();
    }

    function updateUI() {
      const lesson = lessons.find(l => l.id === currentLessonId);
      document.getElementById('slideCounter').textContent = `${currentSlideIndex + 1} / ${lesson.content.length || '-'}`;
      document.getElementById('progressBar').style.width = `${((currentSlideIndex + 1) / (lesson.content.length || 1)) * 100}%`;
      document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
      document.getElementById('nextBtn').disabled = currentSlideIndex === lesson.content.length - 1;
    }

    function fireConfetti() {
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'confetti';
        p.style.left = Math.random() * 100 + '%';
        p.style.backgroundColor = ['#ff6b6b', '#4d96ff', '#6bcb77', '#ffd93d'][Math.floor(Math.random() * 4)];
        p.style.animationDuration = (2 + Math.random()) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 3000);
      }
    }

    // Start
    initApp();
  </script>
</body>

</html>
